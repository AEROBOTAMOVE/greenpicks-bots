name: branding (витрина)
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'какво (logo / welcome / all)'
        default: 'all'
        type: choice
        options: [logo, welcome, all]

permissions:
  contents: read

jobs:
  brand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Шрифтове + Pillow
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-liberation
          pip install --quiet pillow
      - name: Витрина
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ vars.CHAT_ID }}
          CHANNEL_ID: ${{ vars.CHANNEL_ID }}
          BRAND_MODE: ${{ github.event.inputs.mode }}
        run: python branding.py
