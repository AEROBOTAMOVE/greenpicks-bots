name: daily-rhythm (дневен ритъм)
on:
  schedule:
    - cron: '0 5 * * *'     # 08:00 BG — Добро утро
    - cron: '15 5 * * *'    # 08:15 BG — Обзор на деня
    - cron: '0 11 * * *'    # 14:00 BG — Какво следва
    - cron: '0 19 * * *'    # 22:00 BG — Нощна смяна
    - cron: '30 19 * * *'   # 22:30 BG — Чао до утре
  workflow_dispatch:
    inputs:
      mode:
        description: 'режим (за ръчно пускане)'
        default: 'overview'
        type: choice
        options: [morning, overview, midday, night, goodnight]

permissions:
  contents: read
concurrency:
  group: daily-bot
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Шрифтове + Pillow
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-liberation
          pip install --quiet pillow
      - name: Определи режима
        id: m
        run: |
          case "${{ github.event.schedule }}" in
            "0 5 * * *")   echo "mode=morning"   >> $GITHUB_OUTPUT ;;
            "15 5 * * *")  echo "mode=overview"  >> $GITHUB_OUTPUT ;;
            "0 11 * * *")  echo "mode=midday"    >> $GITHUB_OUTPUT ;;
            "0 19 * * *")  echo "mode=night"     >> $GITHUB_OUTPUT ;;
            "30 19 * * *") echo "mode=goodnight" >> $GITHUB_OUTPUT ;;
            *)             echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT ;;
          esac
      - name: Пусни дневния бот
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ vars.CHAT_ID }}
          CHANNEL_ID: ${{ vars.CHANNEL_ID }}
          DAILY_MODE: ${{ steps.m.outputs.mode }}
        run: python daily_bot.py
