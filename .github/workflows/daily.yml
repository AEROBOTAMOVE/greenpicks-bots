name: daily-rhythm (дневен ритъм)
on:
  schedule:
    - cron: '0 5 * * *'     # 08:00 BG — топ новина
    - cron: '0 17 * * *'    # 20:00 BG — втора топ новина
    - cron: '0 18 * * *'    # 21:00 BG — обзор на бота
    - cron: '0 20 * * *'    # 23:00 BG — резултати
  workflow_dispatch:
    inputs:
      mode:
        description: 'topnews / overview / results'
        default: 'overview'
        type: choice
        options: [topnews, overview, results]

permissions:
  contents: write
concurrency:
  group: daily-bot
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Определи режима
        id: m
        run: |
          case "${{ github.event.schedule }}" in
            "0 5 * * *")  echo "mode=topnews"  >> $GITHUB_OUTPUT ;;
            "0 17 * * *") echo "mode=topnews"  >> $GITHUB_OUTPUT ;;
            "0 18 * * *") echo "mode=overview" >> $GITHUB_OUTPUT ;;
            "0 20 * * *") echo "mode=results"  >> $GITHUB_OUTPUT ;;
            *)            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT ;;
          esac
      - name: Пусни дневния бот
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ vars.CHAT_ID }}
          CHANNEL_ID: ${{ vars.CHANNEL_ID }}
          DAILY_MODE: ${{ steps.m.outputs.mode }}
        run: python daily_bot.py
      - name: Запази topnews state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add topnews_state.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            for i in 1 2 3 4 5; do
              git commit -m "topnews state" && git pull --rebase && git push && break
              sleep $((RANDOM % 5 + 2))
            done
          fi
