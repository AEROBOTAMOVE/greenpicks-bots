name: news-showcase (demo)
on:
  workflow_dispatch:
    inputs:
      cap:
        description: 'max news per room'
        default: '8'
        type: string

permissions:
  contents: read

jobs:
  showcase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Showcase news
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ vars.CHAT_ID }}
          NEWS_THREAD_ID: ${{ vars.NEWS_THREAD_ID }}
          SHOWCASE_CAP: ${{ github.event.inputs.cap }}
        run: python news_showcase.py
